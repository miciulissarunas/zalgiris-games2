name: Fetch next Zalgiris game

on:
  workflow_dispatch:
  schedule:
    - cron: "0 */6 * * *"

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Run fetch script
        run: node fetch.js

      - name: Upload debug artifact on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: debug-output
          path: debug-games.json
          if-no-files-found: ignore
          retention-days: 7

      - name: Commit result to repo
        if: success()
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add next-game.json
          if git diff --staged --quiet; then
            echo "Jokių pakeitimų — nieko necommit'inu."
            exit 0
          fi
          git commit -m "Update next game"
          git push
